name: Environment Audit

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "config/environments/**"
      - "scripts/ci/**"
      - ".github/workflows/env-audit.yml"
      - "docs-canonical/ENVIRONMENT.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run env:check -- --offline
