name: Quality Gates

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: |
          uv run ruff check \
            src/pipeline \
            tests/fixtures/keyword_expansion_fixtures.py \
            tests/fixtures/m5_collection_fixtures.py \
            tests/fixtures/m6_signal_extraction_fixtures.py \
            tests/unit/test_keyword_expansion.py \
            tests/unit/test_keyword_deduplication.py \
            tests/unit/test_intent_classifier.py \
            tests/unit/test_collection_plan.py \
            tests/unit/test_batch_executor.py \
            tests/unit/test_result_assembler.py \
            tests/unit/test_data_collection.py \
            tests/unit/test_signal_extraction.py \
            tests/unit/test_serp_parser.py \
            tests/unit/test_domain_classifier.py \
            tests/unit/test_effective_volume.py \
            tests/unit/test_review_velocity.py \
            tests/unit/test_gbp_completeness.py \
            tests/unit/test_signal_extractors.py

      - name: Unit tests
        run: |
          uv run pytest \
            tests/unit/test_keyword_expansion.py \
            tests/unit/test_keyword_deduplication.py \
            tests/unit/test_intent_classifier.py \
            tests/unit/test_collection_plan.py \
            tests/unit/test_batch_executor.py \
            tests/unit/test_result_assembler.py \
            tests/unit/test_data_collection.py \
            tests/unit/test_signal_extraction.py \
            tests/unit/test_serp_parser.py \
            tests/unit/test_domain_classifier.py \
            tests/unit/test_effective_volume.py \
            tests/unit/test_review_velocity.py \
            tests/unit/test_gbp_completeness.py \
            tests/unit/test_signal_extractors.py \
            -v --tb=short

  architecture-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Check domain layer imports
        run: uv run python scripts/check_domain_imports.py

  web-quality:
    name: Web Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --filter=whidby

  spec-artifact-check:
    name: Spec Artifact Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check spec artifacts for module changes
        run: |
          bash .github/scripts/check-spec-artifacts.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

  docs-sync-check:
    name: Docs Sync Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check architecture docs updated for interface changes
        run: |
          bash .github/scripts/check-docs-sync.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
