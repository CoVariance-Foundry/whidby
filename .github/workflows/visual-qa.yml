name: Visual QA

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      app:
        description: "app or admin"
        required: true
        default: "app"
      preview_url:
        description: "Optional deployed preview URL to test directly"
        required: false
        default: ""
      sha:
        description: "Optional commit SHA for artifact id and Vercel lookup"
        required: false
        default: ""
      pr_number:
        description: "Optional PR number for posting Visual QA feedback"
        required: false
        default: ""

permissions:
  contents: read
  checks: read
  statuses: read

concurrency:
  group: visual-qa-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  visual-qa-request:
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'visual-qa') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain manual visual QA dispatch
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          A maintainer requested Visual QA with the `visual-qa` label.

          Secret-bearing Visual QA is intentionally not executed in `pull_request`,
          because that would run PR-controlled code with preview, auth, and agent
          credentials. After the Vercel preview is ready, run this workflow manually
          from `dev` or `main` with `workflow_dispatch` and provide `preview_url`
          plus `pr_number` when PR feedback should be posted.
          SUMMARY

  visual-qa:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.ref_name == 'dev' || github.ref_name == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      statuses: read
      issues: write
      pull-requests: write
    # Secrets are only available on the manual maintainer-dispatched job.
    environment: preview
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Prepare visual QA inputs
        id: qa-inputs
        shell: bash
        env:
          WORKFLOW_SHA: ${{ github.sha }}
          SELECTED_APP: ${{ github.event.inputs.app || 'app' }}
          INPUT_PREVIEW_URL: ${{ github.event.inputs.preview_url || '' }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          INPUT_SHA: ${{ github.event.inputs.sha || '' }}
        run: |
          set -euo pipefail

          if [[ "$SELECTED_APP" != "app" && "$SELECTED_APP" != "admin" ]]; then
            echo "Invalid app input. Expected app or admin." >&2
            exit 1
          fi

          if [[ -n "$INPUT_PR_NUMBER" && ! "$INPUT_PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid pr_number input. Expected a positive integer." >&2
            exit 1
          fi

          sha="$WORKFLOW_SHA"
          if [[ -n "$INPUT_SHA" ]]; then
            if [[ ! "$INPUT_SHA" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "Invalid sha input. Expected a git SHA." >&2
              exit 1
            fi
            sha="$INPUT_SHA"
          fi

          echo "app=$SELECTED_APP" >> "$GITHUB_OUTPUT"
          echo "pr_number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Wait for Vercel preview
        if: ${{ github.event.inputs.preview_url == '' }}
        run: |
          set -euo pipefail
          check_name="${VERCEL_PREVIEW_CHECK_NAME:-Vercel}"
          npm run ci:wait-check -- --repo "$GITHUB_REPOSITORY" --sha "$QA_SHA" --check-name "$check_name"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QA_SHA: ${{ steps.qa-inputs.outputs.sha }}
          VERCEL_PREVIEW_CHECK_NAME: ${{ vars.VERCEL_PREVIEW_CHECK_NAME }}

      - name: Resolve preview URL
        id: preview
        if: ${{ github.event.inputs.preview_url == '' }}
        run: |
          set -euo pipefail
          project_id="$VERCEL_PROJECT_ID_APP"
          if [[ "$QA_APP" == "admin" ]]; then
            project_id="$VERCEL_PROJECT_ID_ADMIN"
          fi

          if [[ -z "$project_id" ]]; then
            echo "Missing Vercel project id secret for selected app." >&2
            exit 1
          fi

          url=$(npm run --silent ci:find-preview -- --sha "$QA_SHA" --project-id "$project_id" --team-id "$VERCEL_TEAM_ID")
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          QA_APP: ${{ steps.qa-inputs.outputs.app }}
          QA_SHA: ${{ steps.qa-inputs.outputs.sha }}
          VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          VERCEL_PROJECT_ID_APP: ${{ secrets.VERCEL_PROJECT_ID_APP }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Validate preview URL
        id: preview-url
        run: |
          set -euo pipefail
          preview_url="$INPUT_PREVIEW_URL"
          if [[ -z "$preview_url" ]]; then
            preview_url="$RESOLVED_PREVIEW_URL"
          fi
          if [[ -z "$preview_url" ]]; then
            echo "Missing preview URL for visual QA." >&2
            exit 1
          fi
          validated_url=$(npm run --silent ci:validate-preview-url -- --url "$preview_url")
          echo "url=$validated_url" >> "$GITHUB_OUTPUT"
        env:
          INPUT_PREVIEW_URL: ${{ github.event.inputs.preview_url || '' }}
          RESOLVED_PREVIEW_URL: ${{ steps.preview.outputs.url }}
          VISUAL_QA_ALLOWED_HOSTS: ${{ vars.VISUAL_QA_ALLOWED_HOSTS }}
          VISUAL_QA_ALLOWED_HOST_SUFFIXES: ${{ vars.VISUAL_QA_ALLOWED_HOST_SUFFIXES }}

      - name: Run Playwright visual QA
        run: |
          set -euo pipefail
          npm run qa:run -- --app "$QA_APP" --base-url "$VALIDATED_PREVIEW_URL" --sha "$QA_SHA"
        env:
          QA_APP: ${{ steps.qa-inputs.outputs.app }}
          QA_SHA: ${{ steps.qa-inputs.outputs.sha }}
          VALIDATED_PREVIEW_URL: ${{ steps.preview-url.outputs.url }}
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}

      - name: Agent review
        id: agent-review
        if: ${{ vars.AI_QA_PROVIDER != '' }}
        continue-on-error: true
        timeout-minutes: 10
        run: npm run qa:agent -- --provider "$AI_QA_PROVIDER" --artifacts artifacts/visual-qa
        env:
          AI_QA_PROVIDER: ${{ vars.AI_QA_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CODEX_QA_COMMAND: ${{ vars.CODEX_QA_COMMAND }}
          CLAUDE_QA_COMMAND: ${{ vars.CLAUDE_QA_COMMAND }}

      - name: Ensure review JSON
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          agent_configured="false"
          if [[ -n "$AI_QA_PROVIDER" ]]; then
            agent_configured="true"
          fi

          if [[ "$agent_configured" == "true" && "$AGENT_REVIEW_OUTCOME" == "failure" ]]; then
            {
              echo "### Visual QA agent review"
              echo
              echo "Agent review was configured but failed. Posting deterministic visual QA artifacts with a failure summary."
            } >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' \
              '{' \
              '  "summary": "Visual QA artifacts were generated, but configured agent review failed. Inspect the Agent review step logs before treating this run as fully reviewed.",' \
              '  "findings": []' \
              '}' > visual-qa-review.json
            exit 0
          fi

          if [[ ! -f visual-qa-review.json ]]; then
            if [[ "$agent_configured" == "true" ]]; then
              summary="Visual QA artifacts were generated. Configured agent review completed without producing review JSON."
            else
              summary="Visual QA artifacts were generated. Agent review was not configured for this run."
            fi
            printf '%s\n' \
              '{' \
              "  \"summary\": \"$summary\"," \
              '  "findings": []' \
              '}' > visual-qa-review.json
          fi
        env:
          AI_QA_PROVIDER: ${{ vars.AI_QA_PROVIDER }}
          AGENT_REVIEW_OUTCOME: ${{ steps.agent-review.outcome }}

      - name: Post PR feedback
        if: ${{ !cancelled() && steps.qa-inputs.outputs.pr_number != '' }}
        run: |
          set -euo pipefail
          artifact_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          npm run qa:post -- \
            --review-json visual-qa-review.json \
            --artifact-url "$artifact_url" \
            --repo "$GITHUB_REPOSITORY" \
            --pr "$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.qa-inputs.outputs.pr_number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: visual-qa
          path: |
            artifacts/visual-qa
            playwright-report
            test-results
            apps/app/playwright-report
            apps/app/test-results
            apps/admin/playwright-report
            apps/admin/test-results
            visual-qa-review.json
          retention-days: 14
