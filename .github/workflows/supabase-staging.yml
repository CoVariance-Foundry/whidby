name: Supabase Staging

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - supabase/migrations/**
      - .github/workflows/supabase-staging.yml

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy migrations to whidby-staging
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: wuybidpvqhhgkukpyyhq
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: 2.98.2

      - name: Initialize Supabase config when absent
        run: |
          # This repo tracks migrations, but does not commit supabase/config.toml.
          if [ ! -f supabase/config.toml ]; then
            supabase init --yes
          fi

      - name: Link staging project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show migration status before deploy
        run: supabase migration list

      - name: Push migrations
        run: supabase db push

      - name: Show migration status after deploy
        run: supabase migration list
