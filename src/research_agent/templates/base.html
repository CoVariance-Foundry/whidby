<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Covariance Report{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #F8F6F1;
      --bg-card: #FFFFFF;
      --bg-surface: #EFEDE6;
      --bg-accent: #1A1714;
      --text-primary: #1A1714;
      --text-secondary: #6B6660;
      --text-tertiary: #9C9790;
      --border: #DDD9D0;
      --border-light: #EBE8E2;
      --teal: #00B894;
      --teal-light: #E1F5EE;
      --amber: #F39C12;
      --amber-light: #FEF3E0;
      --coral: #E17055;
      --coral-light: #FAECE7;
      --font-display: "Fraunces", Georgia, serif;
      --font-body: "DM Sans", system-ui, sans-serif;
      --font-mono: "DM Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      margin: 0 0 0.5rem;
    }
    h1 { font-size: 2.25rem; line-height: 1.15; }
    h2 { font-size: 1.5rem; line-height: 1.25; margin-top: 2rem; }
    h3 { font-size: 1.15rem; line-height: 1.3; margin-top: 1.5rem; }
    p { margin: 0 0 1rem; color: var(--text-secondary); }
    code, .mono {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: var(--bg-surface);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      color: var(--text-primary);
    }
    header.site-header {
      background: var(--bg-accent);
      color: var(--bg);
      padding: 2rem 2.5rem;
    }
    header .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }
    header h1 {
      color: var(--bg);
      font-size: 2.5rem;
      margin: 0 0 0.5rem;
    }
    header .subtitle {
      color: var(--bg-surface);
      font-size: 1rem;
      max-width: 720px;
      margin: 0;
      opacity: 0.85;
    }
    main.container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 2.5rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
    }
    .card-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.4rem;
    }
    .card .value {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      overflow: hidden;
    }
    caption {
      text-align: left;
      font-family: var(--font-display);
      font-size: 1.15rem;
      padding: 0 0 0.75rem;
      color: var(--text-primary);
    }
    th, td {
      padding: 0.7rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.9rem;
    }
    th {
      background: var(--bg-surface);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    tr.top-row td { background: var(--teal-light); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    details {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
    }
    details summary {
      cursor: pointer;
      font-weight: 500;
      color: var(--text-primary);
    }
    details[open] summary { margin-bottom: 0.5rem; }
    footer.site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="eyebrow">{% block eyebrow %}Covariance Research{% endblock %}</div>
    <h1>{% block heading %}{% endblock %}</h1>
    <p class="subtitle">{% block subtitle %}{% endblock %}</p>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    {% block footer_note %}{% endblock %}
  </footer>
</body>
</html>
